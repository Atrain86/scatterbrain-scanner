<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Scan receipts. Split items. Export for taxes." />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scatterbrain" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Scatterbrain Scanner</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Intercept OAuth redirect before React loads — store tokens immediately
      (function() {
        var params = new URLSearchParams(window.location.search);
        var provider = params.get('cloud_auth');
        console.log('[OAuth] cloud_auth param:', provider, 'search:', window.location.search);
        if (!provider) return;
        try {
          var raw = localStorage.getItem('sb_cloud_settings');
          var settings = raw ? JSON.parse(raw) : { googleDrive: {}, dropbox: {}, primaryProvider: null, autoSync: true };
          var key = provider === 'google-drive' ? 'googleDrive' : 'dropbox';
          var expiresIn = params.get('expires_in');
          var token = params.get('access_token');
          console.log('[OAuth] saving provider:', provider, 'token present:', !!token);
          settings[key] = {
            connected: true,
            email: params.get('email'),
            accessToken: token,
            refreshToken: params.get('refresh_token'),
            expiresAt: expiresIn ? Date.now() + Number(expiresIn) * 1000 : null,
            scope: params.get('scope'),
            tokenType: params.get('token_type'),
          };
          if (!settings.primaryProvider) settings.primaryProvider = provider;
          localStorage.setItem('sb_cloud_settings', JSON.stringify(settings));
          console.log('[OAuth] saved to localStorage, redirecting to /settings');
        } catch(e) { console.error('[OAuth] error:', e); }
        window.history.replaceState({}, '', '/settings');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
