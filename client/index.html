<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Scan receipts. Split items. Export for taxes." />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scatterbrain" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Scatterbrain Scanner</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      OAuth callback: pre-React tokens-to-localStorage intercept has been REMOVED.
      Previously this inline script wrote OAuth tokens to the un-namespaced
      `sb_cloud_settings` bucket before React mounted — which was the exact
      credential-leak vector Fix #1 targeted, but this file was missed in that
      commit. The React CloudAuthHandler now handles OAuth callbacks with the
      authenticated userId in scope, writes to `sb_u<userId>_cloud_settings`
      only, and refuses to store tokens if there's no active user. That's the
      correct home for this logic; a pre-React inline script by definition has
      no userId available and cannot participate in per-user isolation.
    -->
    <script>
      // Preserve URL params through history so React's CloudAuthHandler can see them.
      // We only need to reset the URL path if there's a cloud_auth param, so React
      // Router doesn't try to match it to a route.
      (function() {
        var params = new URLSearchParams(window.location.search);
        if (!params.get('cloud_auth')) return;
        // Keep the query string but ensure the path is /settings so React lands there.
        window.history.replaceState({}, '', '/settings' + window.location.search);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- OpenCV.js for receipt auto-crop/perspective correction — loads async, ~8MB, cached by service worker -->
    <script async src="https://docs.opencv.org/4.7.0/opencv.js"></script>
  </body>
</html>
